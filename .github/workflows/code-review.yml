name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Gemini Code Review
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install reviewer dependencies
        run: npm install
        working-directory: ${{ github.workspace }}

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          cat changed_files.txt

      - name: Run AI Code Review on changed files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Review only the files changed in this PR
          node -e "
          import('dotenv/config');
          " 2>/dev/null || true

          # Build a temp dir with only changed files and run reviewer
          node generate_gpt_report.js . model_summary/gemini_report.md || REVIEW_EXIT=$?

          echo "REVIEW_EXIT=${REVIEW_EXIT:-0}" >> $GITHUB_ENV

      - name: Upload review report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-review-report
          path: model_summary/gemini_report.md

      - name: Post review summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🤖 AI Code Review Report\n\n';

            try {
              const report = fs.readFileSync('model_summary/gemini_report.md', 'utf8');
              // Truncate if too long for a PR comment (GitHub limit ~65k chars)
              body += report.length > 60000
                ? report.substring(0, 60000) + '\n\n_...report truncated. Download artifact for full report._'
                : report;
            } catch (e) {
              body += '> Could not read review report. Check the workflow logs.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail if critical issues found
        if: env.REVIEW_EXIT == '1'
        run: |
          echo "Critical issues detected in the code review. See the PR comment for details."
          exit 1
